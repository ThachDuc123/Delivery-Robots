# SAC (off-policy, continuous) -- inherits everything from default.yaml
defaults: default.yaml

algo: sac

sac:
  policy: "MlpPolicy"
  learning_rate: 0.0003
  buffer_size: 300000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  learning_starts: 1000
  ent_coef: "auto"
  policy_kwargs:
    net_arch: [256, 256]
